<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=., initial-scale=1.0">
    <title>Formulário</title>
</head>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: Arial, Helvetica, sans-serif;
            font-weight:normal;
            font-size: large;
        }
        h1 {
            text-align: justify;
            color: rgb(4, 4, 120);
            padding: 10px 0px 10px 5px;
        }
        fieldset {
            padding-left: 15px;
            background-color: rgba(128, 128, 128, 0.242);
            background-image:linear-gradient(to right,white, rgba(4, 4, 130, 0.421));
            width: 500px;
        }
    </style>
<body>
    <h1>Exemplo de Formulário</h1>
    <form action="cadastro.php" method="get" autocomplete="on"></form>

    <fieldset>
        <legend>Dados Pessoais</legend>
         <p>
            <label for="inome">Nome completo:</label>
            <input type="text" name="nome" id="inome" required minlength="3" maxlength="50" placeholder="nome do usuário" size="20" autocomplete="username">
        </p>
    </fieldset>

    <fieldset>
        <legend>Sexo</legend>
        <input type="radio" name="Sexo" id="isexmasc">
            <label for="isexmasc">Masculino</label><br>
        <input type="radio" name="Sexo" id="isexfem">
            <label for="isexfem">Feminino</label>
    </fieldset>
    <fieldset>
        <legend>Esportes favoritos</legend>
        <input type="checkbox" name="esbas" id="iesbas"> 
            <label for="iesbas">Basquete</label><br>
        <input type="checkbox" name="esfut" id="iesfut"> 
            <label for="iesfut">Futebol</label><br>
        <input type="checkbox" name="esnat" id="iesnat"> 
            <label for="iesnat">Natação</label><br>
        <input type="checkbox" name="esten" id="iesten"> 
            <label for="iesten">Tenis</label><br>
        <input type="checkbox" name="escor" id="iescor">
            <label for="iescor">Corrida</label>
    </fieldset>

    <p>
        <input type="submit" value="Enviar">
        <input type="reset" value="Limpar">
    </p>


    
</body>
</html>
