<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criando Formulários</title>
    <link rel="stylesheet" href="cadastro.php">
    <style>
        #formulario {
            text-align: left;
            padding: 10px 10px;
        }

        #formulario label { 
            background-color: rgba(128, 128, 128, 0.492);
            padding: 4px;
        
        }

        #formulario p {
            color: black;
            font-size: large;
            font-family: Arial, Helvetica, sans-serif;
        }

        #formulario  input{
            color:black;
            font-size: large;
            padding: 4px;
            
        }
        .env:hover {
            background-color: rgba(0, 56, 0, 0.605);
            transform: scale(1.1);
        }

        .lim:hover {
            background-color: rgba(104, 4, 4, 0.518);
            transform: scale(1.1);
        }
       

    </style>
</head>
<body>
    <h1>Teste de Formulário</h1>
    <form id="formulario" action="cadastro.php" method="get" autocomplete="on">
        <p>
            <label for="inome">Nome</label>
            <input type="text" name="Nome" id="inome" required maxlength="30" placeholder="Nome completo" autocomplete="name" required>
        </p>
        <p>
            <label for="imedia">Média</label>
            <input type="number" name="media" id="imedia" min="0" max="10" placeholder="0 a 10" step="0.1" required>
        </p>

        <p>
            <label for="imes">Período Letivo</label>
            <input type="month" name="mes" id="imes">
        </p>
        <p>
            <label for="idia">Dia da Prova</label>
            <input type="date" name="dia" id="idia">
        </p>
        <p>
            <label for="ihora">Hora da Prova</label>
            <input type="time" name="Hora" id="ihora">
        </p>

        <p >
            <input class="env" type="submit" value="Enviar">
            <input class="lim" type="reset" value="Limpar">
        </p>
        
    </form>
</body>
</html>
